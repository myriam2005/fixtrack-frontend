version: '3.8'

services:
  backend:
    build: ./fixtrack-backend
    ports:
      - "5000:5000"
    env_file:
      - ./fixtrack-backend/.env
    depends_on:
      - mongodb

  frontend:
    build: ./fixtrack-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    volumes:
      - ./n8n:/home/node/.n8n
    restart: always
    depends_on:
      - backend

volumes:
  mongo_data: